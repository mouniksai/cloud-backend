name: Backend CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint-and-validate:
    name: 🔍 Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for syntax errors
        run: node --check server.js

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: lint-and-validate

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npx jest --testPathPattern="testing/unit" --no-coverage --ci --forceExit
        env:
          JWT_SECRET: test-secret-for-ci
          AES_SECRET_KEY: TestCISecretKey32BytesLongHere!!
          EMAIL_USER: test@example.com
          EMAIL_PASS: test-password
          FACE_API_KEY: test-key
          FACE_API_SECRET: test-secret
          USE_JSON_BLOCKCHAIN: true
          BLOCKCHAIN_NETWORK: disabled
          NODE_ENV: test

  test-coverage:
    name: 📊 Coverage Report
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npx jest --testPathPattern="testing/unit" --coverage --ci --forceExit
        env:
          JWT_SECRET: test-secret-for-ci
          AES_SECRET_KEY: TestCISecretKey32BytesLongHere!!
          EMAIL_USER: test@example.com
          EMAIL_PASS: test-password
          FACE_API_KEY: test-key
          FACE_API_SECRET: test-secret
          USE_JSON_BLOCKCHAIN: true
          BLOCKCHAIN_NETWORK: disabled
          NODE_ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true
